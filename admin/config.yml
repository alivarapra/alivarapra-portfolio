backend:
  name: git-gateway
  branch: main

media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

collections:

  # ── Personal Info ─────────────────────────────────────────────
  - name: "settings"
    label: "⚙️ Personal Info"
    files:

      - name: "profile"
        label: "Profile & Contact"
        file: "_data/profile.json"
        fields:
          - { label: "Full Name",        name: name,        widget: string,  default: "Ali M K" }
          - { label: "Job Title",        name: title,       widget: string,  default: "Group IT Manager" }
          - { label: "Hero Taglines (comma separated)", name: typed_items, widget: string, default: "Group IT Manager, Cybersecurity Expert, Cloud Architect, FinTech Enthusiast" }
          - { label: "Short Bio",        name: short_bio,   widget: text }
          - { label: "Long Bio",         name: long_bio,    widget: text }
          - { label: "Phone",            name: phone,       widget: string,  default: "+973 36500532" }
          - { label: "Email",            name: email,       widget: string,  default: "alivarapra@gmail.com" }
          - { label: "City",             name: city,        widget: string,  default: "Manama, Bahrain" }
          - { label: "Address",          name: address,     widget: string,  default: "Budaiya 555, Bahrain 1212" }
          - { label: "Profile Photo",    name: photo,       widget: image,   default: "/assets/img/my-profile-img.jpg" }
          - { label: "Hero Background",  name: hero_bg,     widget: image,   default: "/assets/img/hero-bg.jpg" }

      - name: "social"
        label: "Social Links"
        file: "_data/social.json"
        fields:
          - { label: "Facebook URL",   name: facebook,   widget: string }
          - { label: "Instagram URL",  name: instagram,  widget: string }
          - { label: "LinkedIn URL",   name: linkedin,   widget: string }
          - { label: "GitHub URL",     name: github,     widget: string }
          - { label: "WhatsApp URL",   name: whatsapp,   widget: string }

  # ── Skills ────────────────────────────────────────────────────
  - name: "skills"
    label: "📊 Skills"
    file: "_data/skills.json"
    fields:
      - name: skills
        label: Skills
        widget: list
        fields:
          - { label: "Skill Name", name: name,  widget: string }
          - { label: "Level (%)", name: level, widget: number, value_type: int, min: 0, max: 100 }

  # ── Stats ─────────────────────────────────────────────────────
  - name: "stats"
    label: "📈 Stats"
    file: "_data/stats.json"
    fields:
      - name: stats
        label: Stats
        widget: list
        fields:
          - { label: "Icon (Bootstrap Icons class)", name: icon,  widget: string }
          - { label: "Value",                        name: value, widget: number, value_type: int }
          - { label: "Label",                        name: label, widget: string }
          - { label: "Sublabel",                     name: sub,   widget: string }

  # ── Education ─────────────────────────────────────────────────
  - name: "education"
    label: "🎓 Education"
    file: "_data/education.json"
    fields:
      - name: education
        label: Education
        widget: list
        fields:
          - { label: "Degree",      name: degree,      widget: string }
          - { label: "Institution", name: institution,  widget: string }
          - { label: "Year",        name: year,         widget: string }
          - { label: "Description", name: description,  widget: text, required: false }

  # ── Experience ────────────────────────────────────────────────
  - name: "experience"
    label: "💼 Work Experience"
    file: "_data/experience.json"
    fields:
      - name: experience
        label: Experience
        widget: list
        fields:
          - { label: "Job Title",   name: title,       widget: string }
          - { label: "Company",     name: company,     widget: string }
          - { label: "Period",      name: period,      widget: string }
          - { label: "Description", name: description, widget: text }
          - name: bullets
            label: "Key Achievements"
            widget: list
            field: { label: "Point", name: point, widget: string }

  # ── Services ──────────────────────────────────────────────────
  - name: "services"
    label: "🛠️ Services"
    file: "_data/services.json"
    fields:
      - name: services
        label: Services
        widget: list
        fields:
          - { label: "Title",       name: title,       widget: string }
          - { label: "Icon (Bootstrap Icons class)", name: icon, widget: string }
          - { label: "Description", name: description, widget: text }

  # ── Portfolio ─────────────────────────────────────────────────
  - name: "portfolio"
    label: "🖼️ Portfolio / Works"
    file: "_data/portfolio.json"
    fields:
      - name: items
        label: Portfolio Items
        widget: list
        fields:
          - { label: "Title",       name: title,    widget: string }
          - { label: "Category",    name: category, widget: select, options: ["security", "cloud", "content", "fintech"] }
          - { label: "Description", name: desc,     widget: string }
          - { label: "Image",       name: image,    widget: image }
          - { label: "Link URL",    name: link,     widget: string, required: false }
